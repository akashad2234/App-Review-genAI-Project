name: Weekly review pulse

on:
  schedule:
    # Run every Sunday at 10:05 UTC = 15:35 IST
    - cron: "5 10 * * 0"
  workflow_dispatch: {}

jobs:
  run-weekly-pulse:
    runs-on: ubuntu-latest

    env:
      # LLM / Groq
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: ${{ secrets.GROQ_MODEL }}

      # Reviews config
      APP_ID: ${{ secrets.APP_ID }}
      REVIEW_WINDOW_WEEKS: ${{ secrets.REVIEW_WINDOW_WEEKS }}
      MAX_REVIEWS: ${{ secrets.MAX_REVIEWS }}

      # Email config
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly pipeline (send email)
        run: |
          python -m src.main --send

